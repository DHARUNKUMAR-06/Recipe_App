<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - SpiceShare</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .dashboard-container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--border-color);
        }

        .dashboard-header h1 {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .stat-card {
            background: var(--surface);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(0, 0, 0, 0.05);
            text-align: center;
            transition: var(--transition);
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-hover);
        }

        .stat-card h3 {
            color: var(--gray);
            font-size: 1.1rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        .stat-card .value {
            font-size: 3rem;
            font-weight: 700;
            color: var(--dark);
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 2rem;
        }

        .chart-card {
            background: var(--surface);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .chart-card h3 {
            margin-bottom: 1.5rem;
            color: var(--dark);
            font-size: 1.2rem;
            border-bottom: 1px solid #eee;
            padding-bottom: 0.5rem;
        }

        .bar-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .bar-item {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .bar-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--dark);
        }

        .bar-track {
            height: 10px;
            background: #eee;
            border-radius: 10px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 10px;
            transition: width 1s ease-in-out;
        }

        @media (max-width: 768px) {
            .charts-grid {
                grid-template-columns: 1fr;
            }
        }

        .stat-card.clickable {
            cursor: pointer;
        }

        .data-table-section {
            background: var(--surface);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(0, 0, 0, 0.05);
            margin-bottom: 2rem;
            display: none;
            overflow-x: auto;
            animation: fadeIn 0.3s ease;
        }

        .data-table-section h3 {
            margin-bottom: 1.5rem;
            color: var(--dark);
            font-size: 1.2rem;
            border-bottom: 1px solid #eee;
            padding-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .close-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 6px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: var(--transition);
        }

        .close-btn:hover {
            background: #c0392b;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
        }

        .data-table th,
        .data-table td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        .data-table th {
            background: rgba(0, 0, 0, 0.02);
            font-weight: 600;
            color: var(--dark);
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="nav-container">
            <h1 class="logo" style="cursor: pointer;" onclick="window.location.href='/'">SpiceShare Admin</h1>
            <div class="nav-links">
                <a href="/">Home</a>
                <a href="/admin-dashboard.html" class="active">Dashboard</a>
                <div id="user-info">
                    <span id="username"></span>
                    <button onclick="logout()">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="dashboard-container">
        <div class="dashboard-header">
            <h1>Platform Analytics</h1>
        </div>

        <div id="loading" class="loading" style="display: none;"></div>

        <div id="dashboard-content">
            <div class="stat-grid">
                <div class="stat-card clickable" onclick="showTable('users')">
                    <h3>Total Users</h3>
                    <div class="value" id="stat-users">0</div>
                    <p style="font-size: 0.8rem; color: var(--gray); margin-top: 5px;">Click to view list</p>
                </div>
                <div class="stat-card clickable" onclick="showTable('recipes')">
                    <h3>Total Recipes</h3>
                    <div class="value" id="stat-recipes">0</div>
                    <p style="font-size: 0.8rem; color: var(--gray); margin-top: 5px;">Click to view list</p>
                </div>
                <div class="stat-card clickable" onclick="showTable('reviews')">
                    <h3>Total Reviews</h3>
                    <div class="value" id="stat-reviews">0</div>
                    <p style="font-size: 0.8rem; color: var(--gray); margin-top: 5px;">Click to view list</p>
                </div>
                <div class="stat-card">
                    <h3>Avg App Rating</h3>
                    <div class="value" id="stat-rating">0.0</div>
                    <p style="font-size: 0.8rem; color: var(--gray); margin-top: 5px;">Platform-wide</p>
                </div>
            </div>

            <div id="data-tables-container" class="data-table-section">
                <!-- Data injected by JS -->
            </div>

            <div class="charts-grid" style="margin-bottom: 2rem;">
                <div class="chart-card" style="grid-column: 1 / -1;">
                    <h3>Platform Analytics (Users & Recipes Growth)</h3>
                    <div style="position: relative; height: 300px; width: 100%;">
                        <canvas id="growthChart"></canvas>
                    </div>
                </div>
            </div>

            <div class="charts-grid">
                <div class="chart-card">
                    <h3>Recipes by Cuisine</h3>
                    <div style="position: relative; height: 300px; width: 100%;">
                        <canvas id="cuisine-chart"></canvas>
                    </div>
                </div>
                <div class="chart-card">
                    <h3>Recipes by Diet Type</h3>
                    <div style="position: relative; height: 300px; width: 100%;">
                        <canvas id="diet-chart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/admin.js"></script>
</body>

</html>
