<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Sharing App</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <nav class="navbar">
        <div class="nav-container">
            <h1 class="logo" style="cursor: pointer;" onclick="window.location.href='/'">RecipeShare</h1>
            <div class="nav-links">
                <div style="display: flex; align-items: center; gap: 0.5rem;">
                    <a href="/" class="active">Home</a>
                    <div class="search-container"
                        style="display: flex; align-items: center; background: rgba(0,0,0,0.05); border-radius: 20px; padding: 4px 10px; min-height: 36px;">
                        <span id="search-icon"
                            style="cursor: pointer; display: flex; align-items: center; justify-content: center; width: 32px; height: 32px; border-radius: 50%; background: var(--surface); color: var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,0.08); transition: all 0.3s ease;"
                            onmouseover="this.style.background='var(--primary)'; this.style.color='white';"
                            onmouseout="this.style.background='var(--surface)'; this.style.color='var(--primary)';"
                            onclick="toggleSearch()">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="11" cy="11" r="8"></circle>
                                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                            </svg>
                        </span>
                        <input type="text" id="global-search-input" placeholder="Search..."
                            style="width: 0; opacity: 0; border: none; outline: none; transition: width 0.3s ease, opacity 0.3s ease; background: transparent; color: var(--dark); padding: 0;"
                            onkeyup="handleGlobalSearch(event)">
                    </div>
                </div>
                <a href="/admin-dashboard.html" style="display: none;">Dashboard</a>
                <a href="/add-recipe.html">Add Recipe</a>
                <a href="/favorites.html">Favorites</a>
                <div id="auth-links">
                    <a href="/landing.html">Join / Login</a>
                </div>
                <div id="user-info" style="display: none;">
                    <span id="username"></span>
                    <button onclick="logout()">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="container">
        <section class="filters">
            <h2>Filter Recipes</h2>
            <div class="filter-group">
                <select id="cuisine-filter">
                    <option value="">All Cuisines</option>
                    <option value="Indian">Indian</option>
                    <option value="Italian">Italian</option>
                    <option value="Chinese">Chinese</option>
                    <option value="Mexican">Mexican</option>
                    <option value="Thai">Thai</option>
                    <option value="Dessert">Dessert</option>
                </select>

                <select id="diet-filter">
                    <option value="">All Diet Types</option>
                    <option value="Veg">Vegetarian</option>
                    <option value="Non-Veg">Non-Vegetarian</option>
                    <option value="Vegan">Vegan</option>
                    <option value="Gluten-Free">Gluten Free</option>
                </select>

                <button onclick="applyFilters()" class="btn-primary">Apply Filters</button>
            </div>
        </section>

        <section class="recipes">
            <h2>All Recipes</h2>
            <div id="recipes-container" class="recipes-grid">
                <!-- Recipes will be loaded here -->
            </div>
        </section>
    </main>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/recipes.js"></script>
</body>

</html>
