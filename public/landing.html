<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - RecipeShare</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .landing-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            gap: 4rem;
            padding: 2rem;
            flex-wrap: wrap;
            max-width: 1400px;
            margin: 0 auto;
        }

        .hero-section {
            flex: 1;
            min-width: 300px;
            text-align: left;
        }

        .hero-section h1 {
            font-size: 4rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
            line-height: 1.2;
        }

        .hero-section p {
            font-size: 1.2rem;
            color: var(--gray);
            margin-bottom: 2.5rem;
            line-height: 1.6;
            max-width: 500px;
        }

        .auth-container {
            flex: 1;
            min-width: 300px;
            max-width: 450px;
            background: var(--surface);
            padding: 3rem;
            border-radius: 30px;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .auth-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 10px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
        }

        .auth-tabs {
            display: flex;
            margin-bottom: 2rem;
            border-bottom: 2px solid #e0e0e0;
        }

        .auth-tab {
            flex: 1;
            text-align: center;
            padding: 1rem;
            cursor: pointer;
            font-weight: 600;
            color: var(--gray);
            transition: var(--transition);
        }

        .auth-tab.active {
            color: var(--primary);
            border-bottom: 3px solid var(--primary);
            margin-bottom: -2px;
        }

        .auth-form-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .auth-form-content.active {
            display: block;
        }

        @media (max-width: 768px) {
            .landing-container {
                flex-direction: column;
                text-align: center;
                gap: 2rem;
            }

            .hero-section {
                text-align: center;
            }

            .hero-section p {
                margin: 0 auto 2rem;
            }
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="nav-container">
            <h1 class="logo" style="cursor: pointer;" onclick="window.location.href='/'">RecipeShare</h1>
            <div class="nav-links">
            </div>
        </div>
    </nav>

    <div class="landing-container">
        <div class="hero-section">
            <h1>Cook. Share. <br>Discover.</h1>
            <p>Join our massive community of food lovers. Find the best recipes from around the world and share your own
                culinary secrets!</p>
        </div>
        <div class="auth-container">
            <div class="auth-tabs">
                <div class="auth-tab active" onclick="switchTab('login')">Login</div>
                <div class="auth-tab" onclick="switchTab('register')">Register</div>
            </div>

            <div id="login-section" class="auth-form-content active">
                <form id="login-form">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="login-email" required>
                    </div>
                    <div class="form-group" style="position: relative;">
                        <label>Password</label>
                        <input type="password" id="login-password" required>
                        <div style="margin-top: 0.5rem; display: flex; align-items: center; gap: 0.5rem;">
                            <input type="checkbox" id="login-show-password" onclick="togglePassword('login-password')"
                                style="width: auto;">
                            <label for="login-show-password" style="font-size: 0.9rem; margin-bottom: 0;">Show
                                Password</label>
                        </div>
                    </div>
                    <button type="submit" class="btn-primary"
                        style="width: 100%; display: block; margin-top: 2rem;">Login</button>
                </form>
            </div>

            <div id="register-section" class="auth-form-content">
                <form id="register-form">
                    <div class="form-group">
                        <label>Name</label>
                        <input type="text" id="register-name" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="register-email" required>
                    </div>
                    <div class="form-group" style="position: relative;">
                        <label>Password</label>
                        <input type="password" id="register-password" required>
                        <div style="margin-top: 0.5rem; display: flex; align-items: center; gap: 0.5rem;">
                            <input type="checkbox" id="register-show-password"
                                onclick="togglePassword('register-password')" style="width: auto;">
                            <label for="register-show-password" style="font-size: 0.9rem; margin-bottom: 0;">Show
                                Password</label>
                        </div>
                    </div>
                    <button type="submit" class="btn-primary"
                        style="width: 100%; display: block; margin-top: 2rem;">Register</button>
                </form>
            </div>
        </div>
        <div style="text-align: center; width: 100%; margin-top: 2rem;">
            <a href="/admin-login.html" style="color: var(--gray); font-size: 0.9rem; text-decoration: underline;">Admin
                Login</a>
        </div>
    </div>

    <script>
        function switchTab(tab) {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.auth-form-content').forEach(c => c.classList.remove('active'));

            if (tab === 'login') {
                document.querySelectorAll('.auth-tab')[0].classList.add('active');
                document.getElementById('login-section').classList.add('active');
            } else {
                document.querySelectorAll('.auth-tab')[1].classList.add('active');
                document.getElementById('register-section').classList.add('active');
            }
        }

        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            if (input.type === "password") {
                input.type = "text";
            } else {
                input.type = "password";
            }
        }
    </script>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
</body>

</html>
