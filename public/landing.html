<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - SpiceShare</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .landing-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            gap: 4rem;
            padding: 2rem;
            flex-wrap: wrap;
            max-width: 1400px;
            margin: 0 auto;
        }

        .hero-section {
            flex: 1;
            min-width: 300px;
            text-align: left;
        }

        .hero-section h1 {
            font-size: 4rem;
            background: linear-gradient(to right, var(--primary), var(--secondary), var(--primary));
            background-size: 200% auto;
            animation: shine 4s linear infinite;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
            line-height: 1.2;
        }

        .hero-section p {
            font-size: 1.2rem;
            color: var(--gray);
            margin-bottom: 2.5rem;
            line-height: 1.6;
            max-width: 500px;
        }

        .auth-container {
            flex: 1;
            min-width: 300px;
            max-width: 450px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 3rem;
            border-radius: 30px;
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.15);
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .auth-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 10px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
        }

        .auth-tabs {
            display: flex;
            margin-bottom: 2rem;
            border-bottom: 2px solid #e0e0e0;
        }

        .auth-tab {
            flex: 1;
            text-align: center;
            padding: 1rem;
            cursor: pointer;
            font-weight: 600;
            color: var(--gray);
            transition: var(--transition);
        }

        .auth-tab.active {
            color: var(--primary);
            border-bottom: 3px solid var(--primary);
            margin-bottom: -2px;
        }

        .auth-form-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .auth-form-content.active {
            display: block;
        }

        @keyframes shine {
            to {
                background-position: 200% center;
            }
        }

        body {
            position: relative;
            background-color: var(--bg-color, #f8fafc);
        }

        .floating-elements {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: -1;
            overflow: hidden;
        }

        .floating-icon {
            position: absolute;
            bottom: -100px;
            font-size: 2.5rem;
            animation: floatUp 20s linear infinite;
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.1));
            opacity: 0;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 0;
            }

            5% {
                opacity: 0.15;
            }

            95% {
                opacity: 0.15;
            }

            100% {
                transform: translateY(calc(-100vh - 100px)) rotate(360deg);
                opacity: 0;
            }
        }

        @media (max-width: 768px) {
            .landing-container {
                flex-direction: column;
                text-align: center;
                gap: 2rem;
            }

            .hero-section {
                text-align: center;
            }

            .hero-section p {
                margin: 0 auto 2rem;
            }
        }
    </style>
</head>

<body>
    <div class="floating-elements">
        <div class="floating-icon" style="left: 10%; animation-delay: 0s;">🍔</div>
        <div class="floating-icon" style="left: 80%; animation-delay: 2s; font-size: 3rem;">🍕</div>
        <div class="floating-icon" style="left: 45%; animation-delay: 4s; font-size: 2.5rem;">🥗</div>
        <div class="floating-icon" style="left: 20%; animation-delay: 6s; font-size: 3.5rem;">🍜</div>
        <div class="floating-icon" style="left: 70%; animation-delay: 8s; font-size: 2rem;">🥑</div>
        <div class="floating-icon" style="left: 30%; animation-delay: 10s; font-size: 3rem;">🍰</div>
        <div class="floating-icon" style="left: 90%; animation-delay: 12s; font-size: 2.8rem;">🌮</div>
        <div class="floating-icon" style="left: 60%; animation-delay: 14s; font-size: 3.2rem;">🍣</div>
        <div class="floating-icon" style="left: 5%; animation-delay: 16s; font-size: 2.2rem;">🍳</div>
        <div class="floating-icon" style="left: 50%; animation-delay: 18s; font-size: 2.6rem;">🥐</div>
    </div>

    <nav class="navbar">
        <div class="nav-container">
            <h1 class="logo" style="cursor: pointer;" onclick="window.location.href='/'">SpiceShare</h1>
            <div class="nav-links">
            </div>
        </div>
    </nav>

    <div class="landing-container">
        <div class="hero-section">
            <h1>Cook. Share. <br>Discover.</h1>
            <p>Join our massive community of food lovers. Find the best recipes from around the world and share your own
                culinary secrets!</p>
        </div>
        <div class="auth-container">
            <div class="auth-tabs">
                <div class="auth-tab active" onclick="switchTab('login')">Login</div>
                <div class="auth-tab" onclick="switchTab('register')">Register</div>
            </div>

            <div id="login-section" class="auth-form-content active">
                <form id="login-form">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="login-email" required>
                    </div>
                    <div class="form-group" style="position: relative;">
                        <label>Password</label>
                        <input type="password" id="login-password" required>
                        <div id="login-error"
                            style="color: var(--danger); font-size: 0.85rem; margin-top: 0.5rem; display: none;"></div>
                        <div style="margin-top: 0.5rem; display: flex; align-items: center; gap: 0.5rem;">
                            <input type="checkbox" id="login-show-password" onclick="togglePassword('login-password')"
                                style="width: auto;">
                            <label for="login-show-password" style="font-size: 0.9rem; margin-bottom: 0;">Show
                                Password</label>
                        </div>
                    </div>
                    <button type="submit" class="btn-primary"
                        style="width: 100%; display: block; margin-top: 2rem;">Login</button>
                </form>
            </div>

            <div id="register-section" class="auth-form-content">
                <form id="register-form">
                    <div class="form-group">
                        <label>Name</label>
                        <input type="text" id="register-name" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="register-email" required>
                    </div>
                    <div class="form-group" style="position: relative;">
                        <label>Password</label>
                        <input type="password" id="register-password" required>
                        <div id="register-error"
                            style="color: var(--danger); font-size: 0.85rem; margin-top: 0.5rem; display: none;"></div>
                        <div style="margin-top: 0.5rem; display: flex; align-items: center; gap: 0.5rem;">
                            <input type="checkbox" id="register-show-password"
                                onclick="togglePassword('register-password')" style="width: auto;">
                            <label for="register-show-password" style="font-size: 0.9rem; margin-bottom: 0;">Show
                                Password</label>
                        </div>
                    </div>
                    <button type="submit" class="btn-primary"
                        style="width: 100%; display: block; margin-top: 2rem;">Register</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        function switchTab(tab) {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.auth-form-content').forEach(c => c.classList.remove('active'));

            if (tab === 'login') {
                document.querySelectorAll('.auth-tab')[0].classList.add('active');
                document.getElementById('login-section').classList.add('active');
            } else {
                document.querySelectorAll('.auth-tab')[1].classList.add('active');
                document.getElementById('register-section').classList.add('active');
            }
        }

        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            if (input.type === "password") {
                input.type = "text";
            } else {
                input.type = "password";
            }
        }
    </script>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
</body>

</html>
